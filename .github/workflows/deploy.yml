name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i "s|__GAS_URL__|${{ secrets.GAS_URL }}|g" app.js
          sed -i "s/__API_KEY__/${{ secrets.API_KEY }}/g" app.js
          echo "--- first 6 lines of app.js after injection ---"
          head -6 app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
